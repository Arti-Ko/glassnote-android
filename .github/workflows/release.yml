name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK & CMake
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.3.11579264" "cmake;3.22.1" >/dev/null
      - name: Build APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
      - name: Stage artifact
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/glassnote-${GITHUB_REF_NAME}.apk"
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
